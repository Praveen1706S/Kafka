spring.application.name=EmailNotificationsService

server.port=0



spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=product-created-events
#spring.kafka.consumer.properties.spring.json.trusted.packages=*


# Required for ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# THIS IS THE MISSING PART
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Ignore producer type headers (VERY IMPORTANT)
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Your DTO class
spring.kafka.consumer.properties.spring.json.value.default.type=com.appsdeveloperblog.ws.emailnotifications.config.ProductCreatedEvent

# Allow packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*